quotes:
  - date: "2026-06-29"
    author: "James Carville"
    author_title: "Democratic strategist and former Bill Clinton adviser"
    is_elected_official: false
    content: >
      "I actually do think it’s time for Democrats to talk the S-word: schism". He added that some DSA-aligned candidates “have no place in the Democratic party” and, of the broader coalition: “I’m not in that fucking political party.”
    source: "Guardian"
    link: "https://www.theguardian.com/us-news/2026/jun/29/centrist-democrats-democratic-socialists-backlash"

  - date: "2026-06-26"
    author: "James Carville"
    author_title: "Democratic strategist and former Bill Clinton adviser"
    is_elected_official: false
    content: >
      "Start your own movement. If it's such a powerful, sweeping movement that's got momentum everywhere, then go ahead and be at the head of it. Don't use the Democratic Party to advance it."
    source: "VOZ"
    link: "https://voz.us/en/politics/260626/36904/group-of-moderate-democrats-is-rebelling-against-the-rise-of-socialism-within-their-ranks-they-should-not-represent-the-face-of-our-party.html"

  - date: "2026-06-26"
    author: "Jessica Killin"
    author_title: "Candidate (CO-05)"
    is_elected_official: false
    content: >
      "They should not be the face of our party. We need to be organized and clear in our vision."
    source: "VOZ"
    link: "https://voz.us/en/politics/260626/36904/group-of-moderate-democrats-is-rebelling-against-the-rise-of-socialism-within-their-ranks-they-should-not-represent-the-face-of-our-party.html"

  - date: "2026-06-24"
    author: "Josh Gottheimer"
    author_title: "U.S. Representative (NJ-05)"
    is_elected_official: true
    content: >
      “Obviously, the socialists had a big win last night. The question is, are we going to let them take over the party? Or are we going to stand up and fight back? ... Many of us believe, as I do, that if you’re a socialist, you’re not a Democrat.”
    source: "Gottheimer Post-Primary Press Remarks"
    link: "https://www.youtube.com/watch?v=J3-Wq6y8jQY"
  
  - date: "2026-06-24"
    author: "Letitia James"
    author_title: "New York Attorney General"
    is_elected_official: true
    content: >
      Some of the candidates that he[Mamdani] has supported are individuals who do not understand the politics of New York City, the cultural differences from district to district, who have not been part of the history and the struggle of some of these districts, and are relatively new to the body politic.
    source: "CNN"
    link: "https://www.cnn.com/2026/06/24/politics/zohran-mamdani-democrat-anger-primaries"
  
  - date: "2026-06-24"
    author: "Greg Meeks"
    author_title: "U.S. Representative (NY-05)"
    is_elected_official: true
    content: >
      Instead of us making sure we put all of our resources to fight Republicans and to fight Donald Trump, we’re using it to fight each other.
    source: "MS Now"
    link: "https://www.ms.now/opinion/zohran-mamdani-democrats-criticism-primaries-socialism"
  
  - date: "2026-06-24"
    author: "Jaime Harrison"
    author_title: "Former Democratic National Committee Chair"
    is_elected_official: false
    content: >
      If you hate the Democratic Party, then please don’t run for our nomination. Don’t use our resources. Don’t rely on our volunteers. Don’t use our infrastructure. Focus on building the party you actually support.
    source: "MS Now"
    link: "https://www.ms.now/opinion/zohran-mamdani-democrats-criticism-primaries-socialism"

  - date: "2026-06-24"
    author: "Tom Suozzi"
    author_title: "U.S. Representative (NY-03)"
    is_elected_official: true
    content: >
      Suozzi said it is time for the Democrats' moderate wing to "wake up" to the threat posed to them by the democratic socialists.
    source: "Axios"
    link: "https://www.axios.com/2026/06/24/mamdani-lander-valdez-chevalier-espaillat-goldman"

  - date: "2026-06-25"
    author: "Anonymous Centrist Democrat"
    author_title: "U.S. Representative"
    is_elected_official: true
    content: >
      "There's going to be a war... [democratic socialists are] bomb-throwers, not problem solvers."
    source: "Axios (via Truthout)"
    link: "https://truthout.org/articles/corporate-democrats-are-mobilizing-to-counter-the-rise-of-democratic-socialists/"

  - date: "2026-06-24"
    author: "John Fetterman"
    author_title: "U.S. Senator (PA)"
    is_elected_official: true
    content: >
      "The people that are winning in the left districts have learned they can be more and more and more intensely anti-Israel, and essentially just much of it is antisemitism... [these primaries] are a red-letter day for the dirtbag left."
    source: "Washington Examiner"
    link: "https://www.washingtonexaminer.com/news/senate/4623926/john-fetterman-democratic-party-expecting-israel-to-grovel/"

  - date: "2021-10-18"
    author: "Jay Jacobs"
    author_title: "Chair of the New York State Democratic Party"
    is_elected_official: false
    content: >
      "I have to endorse David Duke? I don't think in my position I have to endorse David Duke. ... I think it then leads you to the question is it always a requirement of a Democratic elected official, or perhaps the State Chair or party chairs, to endorse the primary winner? And that's a question I would answer no, it's not."
    source: "Spectrum News Interview"
    link: "https://www.cbsnews.com/newyork/news/india-walton-accepts-apology-jay-jacobs-david-duke/"

actions:
  - date: "2026-06-27"
    author: "Tom Suozzi"
    author_title: "U.S. Representative (NY-03)"
    is_elected_official: true
    content: >
      Thirteen moderate Democratic party members and challengers organized and signed onto the "Promise to America" pledge. The strategic initiative was explicitly launched to counter democratic socialist influence, re-centering the party's platform on capitalism and actively rejecting left-wing economic policies.
    source: "The Promise to America Initiative"
    link: "https://www.thepromisetoamerica.com/"
