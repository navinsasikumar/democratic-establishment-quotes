quotes:
  - date: "2026-06-25"
    author: "Josh Gottheimer"
    author_title: "U.S. Representative (NJ-5)"
    is_elected_official: true
    content: >
      “Obviously, the socialists had a big win last night. The question is, are we going to let them take over the party? Or are we going to stand up and fight back? ... Many of us believe, as I do, that if you’re a socialist, you’re not a Democrat.”
    source: "Gottheimer Post-Primary Press Remarks"
    link: "https://www.youtube.com/watch?v=J3-Wq6y8jQY"

  - date: "2026-06-24"
    author: "Tom Suozzi"
    author_title: "U.S. Representative (NY-3)"
    is_elected_official: true
    content: >
      Suozzi said it is time for the Democrats' moderate wing to "wake up" to the threat posed to them by the democratic socialists.
    source: "Axios"
    link: "https://www.axios.com/2026/06/24/mamdani-lander-valdez-chevalier-espaillat-goldman"

  - date: "2026-06-25"
    author: "Anonymous Centrist Democrat"
    author_title: "U.S. Representative"
    is_elected_official: true
    content: >
      "There's going to be a war... [democratic socialists are] bomb-throwers, not problem solvers."
    source: "Axios (via Truthout)"
    link: "https://truthout.org/articles/corporate-democrats-are-mobilizing-to-counter-the-rise-of-democratic-socialists/"

  - date: "2026-06-24"
    author: "John Fetterman"
    author_title: "U.S. Senator (PA)"
    is_elected_official: true
    content: >
      "The people that are winning in the left districts have learned they can be more and more and more intensely anti-Israel, and essentially just much of it is antisemitism... [these primaries] are a red-letter day for the dirtbag left."
    source: "Washington Examiner"
    link: "https://www.washingtonexaminer.com/news/senate/4623926/john-fetterman-democratic-party-expecting-israel-to-grovel/"

  - date: "2021-10-18"
    author: "Jay Jacobs"
    author_title: "Chair of the New York State Democratic Party"
    is_elected_official: false
    content: >
      "I have to endorse David Duke? I don't think in my position I have to endorse David Duke. ... I think it then leads you to the question is it always a requirement of a Democratic elected official, or perhaps the State Chair or party chairs, to endorse the primary winner? And that's a question I would answer no, it's not."
    source: "Spectrum News Interview"
    link: "https://www.cbsnews.com/newyork/news/india-walton-accepts-apology-jay-jacobs-david-duke/"

actions:
  - date: "2026-06-23"
    author: "Hakeem Jeffries"
    author_title: "House Minority Leader"
    is_elected_official: true
    content: >
      House Minority Leader Hakeem Jeffries actively supported and campaigned for establishment candidates, including Dan Goldman, to counter the influence of democratic socialist primary challengers backed by NYC Mayor Zohran Mamdani.
    source: "The Guardian"
    link: "https://www.theguardian.com/us-news/2026/jun/23/new-york-democratic-primaries"

  - date: "2025-11-04"
    author: "Andrew Cuomo"
    author_title: "Former Governor of New York"
    is_elected_official: false
    content: >
      After democratic socialist Zohran Mamdani won the 2025 Democratic primary for New York City Mayor, former Governor Andrew Cuomo launched an independent campaign against him in the general election instead of supporting the party's nominee.
    source: "2025 New York City Mayoral Election Coverage"
    link: "https://www.nextdems.org/zohran-mamdani-and-the-reinvention-of-the-democratic-party"

  - date: "2021-11-02"
    author: "Byron Brown"
    author_title: "Mayor of Buffalo, NY"
    is_elected_official: true
    content: >
      After losing the Democratic primary to democratic socialist India Walton, incumbent Mayor Byron Brown refused to concede and ran a successful write-in campaign in the general election to defeat the party's official nominee, with the backing of state establishment Democrats.
    source: "Convergence Magazine Analysis"
    link: "https://convergencemag.com/articles/why-did-centrist-democrats-fight-india-walton-so-hard/"
